<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Раскраска — игра</title>
<style>
  :root{ --ink:#2b2b2b; --paper:#fbf7ef; --card:#ffffff; --line:#e7e0d4; --accent:#1E88E5; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:'Segoe UI',Roboto,Arial,sans-serif; color:var(--ink);
        background:var(--paper); display:flex; flex-direction:column; min-height:100vh; }
  header{ padding:14px 16px 8px; text-align:center; }
  header h1{ margin:0; font-size:24px; letter-spacing:.5px; }
  header p{ margin:4px 0 0; font-size:13px; color:#8a8275; }

  .tabs{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:10px 12px 0; }
  .tab{ border:2px solid var(--line); background:var(--card); color:var(--ink);
        padding:8px 18px; border-radius:999px; font-size:15px; font-weight:600;
        cursor:pointer; transition:.15s; }
  .tab:hover{ border-color:#cdbfa6; }
  .tab.active{ background:var(--accent); border-color:var(--accent); color:#fff; }

  main{ flex:1; display:flex; justify-content:center; align-items:flex-start; padding:14px 12px; }
  .stage{ width:100%; max-width:460px; }
  .stage.hidden{ display:none; }
  .stage svg{ width:100%; height:auto; display:block; background:#fff;
        border:1px solid var(--line); border-radius:14px;
        box-shadow:0 8px 26px rgba(60,50,30,.10); }

  .dock{ position:sticky; bottom:0; background:rgba(251,247,239,.96);
        backdrop-filter:blur(4px); border-top:1px solid var(--line);
        padding:10px 12px calc(10px + env(safe-area-inset-bottom)); }
  .palette{ display:grid; grid-template-columns:repeat(9,1fr); gap:8px;
        max-width:430px; margin:0 auto 10px; }
  .sw{ aspect-ratio:1; border-radius:50%; border:2px solid rgba(0,0,0,.15);
        background:var(--c); cursor:pointer; padding:0; transition:transform .1s; }
  .sw:hover{ transform:scale(1.08); }
  .sw.active{ outline:3px solid var(--accent); outline-offset:2px; border-color:#fff; }
  .sw.eraser{ background:
        repeating-conic-gradient(#fff 0 25%, #e9e9e9 0 50%) 50%/14px 14px; }

  .actions{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; max-width:430px; margin:0 auto; }
  .btn{ border:2px solid var(--line); background:var(--card); color:var(--ink);
        padding:9px 16px; border-radius:12px; font-size:14px; font-weight:600;
        cursor:pointer; transition:.15s; }
  .btn:hover{ border-color:#cdbfa6; }
  .btn.primary{ background:#43A047; border-color:#43A047; color:#fff; }

  @media (min-width:760px){
    .palette{ grid-template-columns:repeat(18,1fr); max-width:620px; }
    header h1{ font-size:28px; }
  }
</style>
</head>

      <button class="sw eraser" style="--c:#FFFFFF" data-color="#FFFFFF" title="Ластик"></button>
    </div>
    <div class="actions">
      <button class="btn" id="clear">Очистить</button>
      <button class="btn primary" id="save">Скачать PNG</button>
    </div>
  </div>

<script>
  let color = "#E53935";
  let pic = "kotik";

  // palette
  const sws = [...document.querySelectorAll('.sw')];
  function setColor(c, el){
    color = c;
    sws.forEach(s => s.classList.toggle('active', s === el));
  }
  sws.forEach(s => s.addEventListener('click', () => setColor(s.dataset.color, s)));
  setColor("#E53935", sws[0]);

  // tabs
  const tabs = [...document.querySelectorAll('.tab')];
  const stages = {
    kotik: document.getElementById('kotik'),
    raketa: document.getElementById('raketa'),
    cvetok: document.getElementById('cvetok'),
    ras4: document.getElementById('ras4'),
  };
  tabs.forEach(t => t.addEventListener('click', () => {
    pic = t.dataset.pic;
    tabs.forEach(x => x.classList.toggle('active', x === t));
    Object.entries(stages).forEach(([k, el]) => el.classList.toggle('hidden', k !== pic));
  }));

  // painting
  document.querySelectorAll('.region').forEach(r => {
    r.addEventListener('click', () => { r.style.fill = color; });
  });

  // clear current picture
  document.getElementById('clear').addEventListener('click', () => {
    stages[pic].querySelectorAll('.region').forEach(r => { r.style.fill = ''; });
  });

  // download current picture as PNG
  document.getElementById('save').addEventListener('click', () => {
    const svg = stages[pic].querySelector('svg');
    const clone = svg.cloneNode(true);
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    const data = new XMLSerializer().serializeToString(clone);
    const url = URL.createObjectURL(new Blob([data], {type:'image/svg+xml;charset=utf-8'}));
    const img = new Image();
    img.onload = () => {
      const scale = 2, c = document.createElement('canvas');
      c.width = 600*scale; c.height = 800*scale;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#fff'; ctx.fillRect(0,0,c.width,c.height);
      ctx.drawImage(img, 0, 0, c.width, c.height);
      URL.revokeObjectURL(url);
      c.toBlob(b => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = 'raskraska-' + pic + '.png';
        a.click();
      });
    };
    img.src = url;
  });
</script>
